---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fm-backend
  namespace: feedmaker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fm-backend-app
  template:
    metadata:
      labels:
        app: fm-backend-app
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fm-backend
          image: registry.terzeron.com/terzeron/fm_backend:latest
          # readOnlyRootFilesystem 미적용: 앱이 /app/run.log(rootfs)에 로깅하므로
          # 켜면 로깅이 깨진다. logging.conf 경로 변경 후 별도 적용 예정.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8010
          readinessProbe:
            tcpSocket:
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 20
          env:
            # --- topology constants (pod-specific; intentionally NOT sourced from .env,
            #     whose values are host-local: FM_DB_HOST/paths differ in the pod) ---
            - name: FM_DB_HOST
              value: fm-db-mysql
            - name: FM_DB_PORT
              value: "3306"
            - name: FM_HOME_DIR
              value: /app
            - name: FM_WORK_DIR
              value: /fma
            - name: FM_LOG_DIR
              value: /logs
            - name: WEB_SERVICE_ROOT_DIR
              value: /
            - name: WEB_SERVICE_FEED_DIR_PREFIX
              value: /xml
            - name: WEB_SERVICE_IMAGE_DIR_PREFIX
              value: /xml/img
            - name: WEB_SERVICE_PDF_DIR_PREFIX
              value: /xml/pdf

            # --- DB password: bitnami-managed Secret (single source for the password) ---
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fm-db-mysql
                  key: mysql-password

            # --- portable config: generated from .env into the fm-config ConfigMap.
            #     Regenerate with k8s/apply-config.sh after editing .env, then rollout. ---
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MYSQL_USER
            - name: FM_BACKEND_PORT
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: FM_BACKEND_PORT
            - name: FM_FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: FM_FRONTEND_URL
            - name: FM_FACEBOOK_LOGIN_ALLOWED_EMAIL_LIST
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: FM_FACEBOOK_LOGIN_ALLOWED_EMAIL_LIST
            - name: WEB_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: WEB_SERVICE_URL
            - name: WEB_SERVICE_FEED_URL_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: WEB_SERVICE_FEED_URL_PREFIX
            - name: WEB_SERVICE_IMAGE_URL_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: WEB_SERVICE_IMAGE_URL_PREFIX
            - name: WEB_SERVICE_PDF_URL_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: WEB_SERVICE_PDF_URL_PREFIX
            - name: MSG_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_CHANNEL
            - name: MSG_EMAIL_SENDER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_EMAIL_SENDER_ADDR
            - name: MSG_EMAIL_SENDER_NAME
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_EMAIL_SENDER_NAME
            - name: MSG_EMAIL_RECIPIENT_LIST
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_EMAIL_RECIPIENT_LIST
            - name: MSG_SMTP_SERVER
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_SMTP_SERVER
            - name: MSG_SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: fm-config
                  key: MSG_SMTP_PORT

          volumeMounts:
            - name: public-html-xml-pvc
              mountPath: /xml
            - name: fma-pvc
              mountPath: /fma
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: public-html-xml-pvc
          persistentVolumeClaim:
            claimName: public-html-xml-pvc
        - name: fma-pvc
          persistentVolumeClaim:
            claimName: fma-pvc
        - name: tmp
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fm-frontend
  namespace: feedmaker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fm-frontend-app
  template:
    metadata:
      labels:
        app: fm-frontend-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fm-frontend
          image: registry.terzeron.com/terzeron/fm_frontend:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            # nginx-unprivileged: pid/temp 전부 /tmp 사용 → readOnlyRootFilesystem 호환
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: fm-backend
  namespace: feedmaker
spec:
  selector:
    app: fm-backend-app
  ports:
    - protocol: TCP
      port: 8010
      targetPort: 8010
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: fm-frontend
  namespace: feedmaker
spec:
  selector:
    app: fm-frontend-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
