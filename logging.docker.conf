# 컨테이너 전용 로깅 설정 (Dockerfile이 /app/logging.conf 로 복사).
# readOnlyRootFilesystem 호환을 위해 파일 핸들러 없이 stdout 으로만 출력하고,
# 로그 수집은 k8s(kubectl logs / 수집기)가 담당한다. 로테이션도 kubelet 이 처리.
# 호스트 CLI 는 repo 의 logging.conf(파일 핸들러 포함)를 그대로 사용한다.

[loggers]
keys=root,uvicorn,fastapi,audit

[handlers]
keys=consoleHandler

[formatters]
keys=consoleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_uvicorn]
level=DEBUG
handlers=consoleHandler
qualname=uvicorn
propagate=0

[logger_fastapi]
level=DEBUG
handlers=consoleHandler
qualname=fastapi
propagate=0

[logger_audit]
level=INFO
handlers=consoleHandler
qualname=audit
propagate=0

# level 은 INFO(호스트 logging.conf 와 동일). 컨테이너엔 파일 핸들러가 없어 console 이 곧
# stdout 인데, feed 파이프라인이 그 stdout 을 HTML content 로 캡처하므로(Process.exec_cmd)
# DEBUG 로 두면 DEBUG 로그가 생성 HTML 을 오염시킨다.
[handler_consoleHandler]
level=INFO
class=StreamHandler
formatter=consoleFormatter
args=(sys.stdout,)

[formatter_consoleFormatter]
format=[%(asctime)s][%(filename)s:%(lineno)d][%(levelname)s] %(message)s
